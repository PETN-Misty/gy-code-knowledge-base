<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GY · 代码知识库</title>
  <!-- highlight.js 语法高亮 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ===== Header ===== */
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,.15);
      flex-wrap: wrap;
      gap: 8px;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .header h1 small {
      font-size: 13px;
      font-weight: 400;
      opacity: .7;
      margin-left: 10px;
    }
    .watermark-badge {
      display: inline-block;
      background: #e94560;
      color: #fff;
      font-weight: 700;
      font-size: 12px;
      padding: 2px 10px;
      border-radius: 4px;
      margin-left: 8px;
    }
    .badge {
      background: rgba(255,255,255,.15);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
    }

    /* ===== Layout ===== */
    .container { display: flex; max-width: 1500px; margin: 0 auto; padding: 20px; gap: 20px; align-items: flex-start; }
    .sidebar { width: 280px; flex-shrink: 0; position: sticky; top: 20px; }
    .main { flex: 1; min-width: 0; }

    /* ===== Cards ===== */
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .card-header {
      padding: 14px 18px;
      border-bottom: 1px solid #eee;
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-body { padding: 14px 18px; }

    /* ===== Alert ===== */
    .alert {
      padding: 10px 16px; border-radius: 8px; font-size: 14px;
      margin-bottom: 14px; display: none;
    }
    .alert.show { display: block; }
    .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .alert-danger  { background: #f8d7da; color: #721c24; border: 1px solid #f5c6c6; }
    .alert-info    { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }

    /* ===== Language Filter ===== */
    .lang-list { list-style: none; }
    .lang-item {
      padding: 7px 12px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      transition: all .15s;
      margin-bottom: 2px;
    }
    .lang-item:hover { background: #f0f2f8; }
    .lang-item.active { background: #e8edf8; color: #0f3460; font-weight: 600; }
    .lang-count {
      font-size: 12px;
      background: #eee;
      padding: 1px 8px;
      border-radius: 10px;
      color: #888;
    }
    .lang-item.active .lang-count { background: #0f3460; color: #fff; }

    /* ===== Difficulty Filter ===== */
    .diff-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .diff-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid #ddd;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      transition: all .15s;
    }
    .diff-btn:hover { border-color: #0f3460; }
    .diff-btn.active {
      background: #0f3460;
      color: #fff;
      border-color: #0f3460;
    }

    /* ===== Code Cards ===== */
    .code-card {
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      margin-bottom: 12px;
      overflow: hidden;
      transition: box-shadow .2s;
      background: #fff;
    }
    .code-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .code-card-header {
      padding: 14px 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .code-card-info { flex: 1; min-width: 0; }
    .code-card-title {
      font-weight: 600;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .code-card-meta {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .code-card-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .expand-icon {
      font-size: 12px;
      color: #aaa;
      transition: transform .2s;
      flex-shrink: 0;
    }
    .code-card.expanded .expand-icon { transform: rotate(90deg); }

    /* ===== Language & Difficulty Tags ===== */
    .lang-tag {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
    }
    .lang-tag.js, .lang-tag.javascript { background: #f7df1e; color: #000; }
    .lang-tag.ts, .lang-tag.typescript { background: #3178c6; }
    .lang-tag.py, .lang-tag.python { background: #3776ab; }
    .lang-tag.java { background: #b07219; }
    .lang-tag.go { background: #00add8; }
    .lang-tag.rs, .lang-tag.rust { background: #dea584; color: #000; }
    .lang-tag.cpp, .lang-tag.c\+\+ { background: #00599c; }
    .lang-tag.cs, .lang-tag.c# { background: #239120; }
    .lang-tag.php { background: #777bb3; }
    .lang-tag.rb, .lang-tag.ruby { background: #cc342d; }
    .lang-tag.swift { background: #f05138; }
    .lang-tag.kt, .lang-tag.kotlin { background: #7f52ff; }
    .lang-tag.unknown { background: #666; }

    .diff-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .diff-tag.beginner { background: #d4edda; color: #155724; }
    .diff-tag.intermediate { background: #fff3cd; color: #856404; }
    .diff-tag.advanced { background: #f8d7da; color: #721c24; }

    .tag-badge {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 4px;
      font-size: 11px;
      background: #f0f0f0;
      color: #666;
    }

    /* ===== Code Body (Expandable) ===== */
    .code-card-body {
      display: none;
      border-top: 1px solid #e8e8e8;
    }
    .code-card.expanded .code-card-body { display: block; }

    .code-description {
      padding: 12px 18px;
      font-size: 14px;
      color: #555;
      border-bottom: 1px solid #f0f0f0;
      line-height: 1.5;
    }
    .code-block-wrap {
      position: relative;
    }
    .code-block-wrap pre {
      margin: 0 !important;
      border-radius: 0 0 10px 10px !important;
      max-height: 500px;
      overflow-y: auto;
    }
    .code-block-wrap pre code {
      font-size: 13px !important;
      line-height: 1.5 !important;
      padding: 16px 18px !important;
    }
    .copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(255,255,255,.1);
      color: #aaa;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
    }
    .copy-btn:hover { background: rgba(255,255,255,.2); color: #fff; }

    /* ===== Buttons ===== */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 16px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: all .2s;
    }
    .btn-primary { background: #0f3460; color: #fff; }
    .btn-primary:hover { background: #1a4a7a; }
    .btn-danger { background: #e94560; color: #fff; }
    .btn-danger:hover { background: #c73a52; }
    .btn-success { background: #2ecc71; color: #fff; }
    .btn-success:hover { background: #27ae60; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-outline {
      background: transparent; color: #0f3460;
      border: 1px solid #0f3460;
    }
    .btn-outline:hover { background: #0f3460; color: #fff; }
    .btn-ghost {
      background: transparent; color: #888;
      border: 1px solid #ddd;
    }
    .btn-ghost:hover { border-color: #aaa; color: #555; }
    .btn-icon {
      padding: 4px 8px;
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 14px;
      color: #888;
      border-radius: 4px;
    }
    .btn-icon:hover { background: #f0f0f0; color: #333; }

    /* ===== Form ===== */
    .form-group { margin-bottom: 12px; }
    .form-group label {
      display: block; font-size: 13px; font-weight: 500;
      margin-bottom: 4px; color: #555;
    }
    .form-control {
      width: 100%; padding: 8px 12px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 14px;
      transition: border-color .2s;
    }
    .form-control:focus { outline: none; border-color: #0f3460; }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }
    textarea.form-control { font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace; font-size: 13px; min-height: 120px; resize: vertical; }

    /* ===== Modal ===== */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.4); z-index: 1000;
      justify-content: center; align-items: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #fff; border-radius: 16px;
      width: 90%; max-width: 640px; max-height: 85vh;
      overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    .modal-header {
      padding: 18px 24px; border-bottom: 1px solid #eee;
      font-size: 17px; font-weight: 600;
      display: flex; justify-content: space-between; align-items: center;
    }
    .modal-header .close {
      background: none; border: none; font-size: 24px;
      cursor: pointer; color: #999; line-height: 1;
    }
    .modal-header .close:hover { color: #333; }
    .modal-body { padding: 24px; }
    .modal-footer {
      padding: 14px 24px; border-top: 1px solid #eee;
      display: flex; justify-content: flex-end; gap: 12px;
    }

    /* ===== Search ===== */
    .search-box {
      display: flex;
      gap: 6px;
    }
    .search-box .form-control { flex: 1; }

    /* ===== AI Result ===== */
    .ai-result {
      margin-top: 8px;
      font-size: 14px;
      display: none;
    }
    .ai-result.show { display: block; }
    .ai-answer {
      padding: 10px 14px;
      background: #e8f4fd;
      border-radius: 8px;
      border-left: 3px solid #0f3460;
      margin-bottom: 8px;
    }
    .ai-sql {
      padding: 6px 10px;
      background: #f5f5f5;
      border-radius: 6px;
      font-family: monospace;
      font-size: 12px;
      color: #666;
      overflow-x: auto;
      margin-bottom: 8px;
    }
    .ai-card {
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: all .15s;
    }
    .ai-card:hover { background: #f8f9ff; }
    .ai-card .card-title { font-weight: 600; font-size: 14px; }
    .ai-card .card-sub { font-size: 12px; color: #888; }

    /* ===== Empty State ===== */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
    }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state .empty-text { font-size: 16px; }

    /* ===== Loading ===== */
    .loading { text-align: center; padding: 40px; color: #aaa; }
    .spinner {
      display: inline-block; width: 28px; height: 28px;
      border: 3px solid #eee; border-top-color: #0f3460;
      border-radius: 50%; animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== RAG ===== */
    .rag-section { margin-top: 8px; }
    .rag-status {
      font-size: 13px;
      color: #888;
      cursor: pointer;
      padding: 6px 0;
    }
    .rag-ask-box { display: flex; gap: 6px; margin-top: 8px; }
    .rag-ask-box .form-control { flex: 1; }
    .rag-result { margin-top: 6px; font-size: 13px; display: none; }
    .rag-result.show { display: block; }
    .rag-upload { margin-top: 8px; padding: 10px; border: 2px dashed #ccc; border-radius: 8px; text-align: center; font-size: 13px; color: #888; cursor: pointer; transition: all .2s; }
    .rag-upload:hover { border-color: #0f3460; color: #0f3460; background: #f8f9ff; }
    .rag-upload.dragover { border-color: #0f3460; background: #e8f0ff; }
    .rag-upload input[type=file] { display: none; }
    .rag-tools { display: flex; gap: 6px; margin-top: 8px; }
    .rag-tools .btn { flex: 1; font-size: 12px; padding: 6px; }

    /* ===== Footer ===== */
    .footer {
      text-align: center; padding: 16px; color: #aaa;
      font-size: 12px; border-top: 1px solid #eee; margin-top: 20px;
    }

    /* ===== Response Box ===== */
    .response-box {
      background: #1a1a2e; color: #a8d8ea; border-radius: 10px;
      padding: 14px 18px; font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 12px; line-height: 1.6; overflow-x: auto;
      max-height: 200px; overflow-y: auto; white-space: pre-wrap;
      margin-top: 12px; display: none;
    }
    .response-box.show { display: block; }

    /* ===== Toolbar ===== */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .result-count {
      font-size: 14px;
      color: #888;
    }

    /* ===== KB Toggle ===== */
    .chat-tools {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 20px;
      border-top: 1px solid #e8e8e8;
      background: #fafafa;
      flex-shrink: 0;
    }
    .kb-toggle-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }
    .kb-toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .kb-toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }
    .kb-toggle .slider {
      position: absolute;
      inset: 0;
      background: #ddd;
      border-radius: 20px;
      transition: all .25s;
      cursor: pointer;
    }
    .kb-toggle .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      bottom: 2px;
      background: #fff;
      border-radius: 50%;
      transition: all .25s;
      box-shadow: 0 1px 3px rgba(0,0,0,.15);
    }
    .kb-toggle input:checked + .slider {
      background: #0f3460;
    }
    .kb-toggle input:checked + .slider::before {
      transform: translateX(16px);
    }
    .kb-toggle-label {
      font-size: 13px;
      color: #999;
      white-space: nowrap;
      transition: color .2s;
    }
    .kb-toggle-label.active {
      color: #0f3460;
      font-weight: 500;
    }
    .kb-hint {
      font-size: 11px;
      color: #bbb;
      transition: all .2s;
    }
    .kb-hint.active {
      color: #0f3460;
    }

    /* ===== KB Sources in Chat ===== */
    .kb-sources {
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid #e8e8e8;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .kb-sources-label {
      font-size: 11px;
      color: #aaa;
      white-space: nowrap;
    }
    .kb-source-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      background: #e8f4fd;
      color: #0f3460;
      cursor: default;
    }
    .kb-no-result {
      margin-top: 6px;
      font-size: 12px;
      color: #bbb;
      padding-top: 6px;
      border-top: 1px solid #f0f0f0;
    }

    /* ===== Responsive ===== */
    @media (max-width: 900px) {
      .container { flex-direction: column; }
      .sidebar { width: 100%; position: static; }
    }
    @media (max-width: 600px) {
      .header { padding: 14px 16px; }
      .container { padding: 12px; }
      .code-card-header { flex-direction: column; align-items: flex-start; }
      .code-card-actions { align-self: flex-end; }
    }

    /* ===== Scrollbar ===== */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #aaa; }

    /* ===== Select ===== */
    select.form-control { appearance: auto; }

    /* ===== Page Switching ===== */
    .page { display: none; }
    .page.active { display: block; }

    /* ===== Navigation Tabs ===== */
    .nav-tabs {
      display: flex;
      gap: 4px;
      margin-left: 20px;
    }
    .nav-tab {
      padding: 6px 16px;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,.1);
      color: rgba(255,255,255,.7);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all .2s;
    }
    .nav-tab:hover { background: rgba(255,255,255,.2); color: #fff; }
    .nav-tab.active {
      background: rgba(255,255,255,.2);
      color: #fff;
      box-shadow: 0 0 0 1px rgba(255,255,255,.3);
    }

    /* ===== Chat Layout ===== */
    .chat-layout {
      display: flex;
      height: calc(100vh - 64px);
      max-width: 100%;
    }
    .chat-sidebar {
      width: 260px;
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid #e8e8e8;
      display: flex;
      flex-direction: column;
    }
    .chat-sidebar-header {
      padding: 14px 16px;
      border-bottom: 1px solid #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .chat-sidebar-title { font-weight: 600; font-size: 15px; }
    .chat-session-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .chat-session-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 4px;
      transition: all .15s;
    }
    .chat-session-item:hover { background: #f0f2f8; }
    .chat-session-item.active { background: #e8edf8; }
    .chat-session-title {
      font-size: 14px;
      font-weight: 500;
      color: #1a1a2e;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .chat-session-preview {
      font-size: 12px;
      color: #999;
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .chat-session-meta {
      font-size: 11px;
      color: #bbb;
      margin-top: 2px;
      display: flex;
      gap: 8px;
    }
    .chat-session-delete {
      float: right;
      opacity: 0;
      transition: opacity .15s;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      color: #e94560;
      padding: 2px;
    }
    .chat-session-item:hover .chat-session-delete { opacity: 1; }

    /* ===== Chat Main ===== */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #f8f9fc;
      min-width: 0;
    }
    .chat-empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
    }
    .chat-empty-icon { font-size: 64px; margin-bottom: 16px; opacity: .3; }
    .chat-empty-title { font-size: 20px; font-weight: 600; color: #333; margin-bottom: 8px; }
    .chat-empty-desc { font-size: 14px; color: #999; max-width: 360px; line-height: 1.5; }

    /* ===== Chat Header ===== */
    .chat-header {
      padding: 12px 20px;
      border-bottom: 1px solid #e8e8e8;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .chat-header-title { font-weight: 600; font-size: 16px; display: flex; align-items: center; gap: 6px; }
    .chat-header-info { font-size: 13px; color: #888; display: flex; align-items: center; gap: 8px; }

    /* ===== Chat Messages ===== */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .chat-empty-msg {
      text-align: center;
      color: #ccc;
      font-size: 14px;
      padding: 40px;
    }
    .chat-message {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .chat-message.user {
      align-self: flex-end;
      background: #0f3460;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .chat-message.ai {
      align-self: flex-start;
      background: #fff;
      color: #1a1a2e;
      border: 1px solid #e8e8e8;
      border-bottom-left-radius: 4px;
    }
    .chat-message.ai pre {
      margin: 8px 0;
      border-radius: 8px;
      overflow-x: auto;
    }
    .chat-message.ai pre code {
      font-size: 13px;
      padding: 12px !important;
    }
    .chat-message.ai p { margin: 4px 0; }
    .chat-message.ai ul, .chat-message.ai ol { margin: 4px 0; padding-left: 20px; }
    .chat-message.ai h1, .chat-message.ai h2, .chat-message.ai h3 { font-size: inherit; font-weight: 600; margin: 8px 0 4px; }
    .chat-message .msg-role-icon { margin-right: 6px; }
    .chat-message.ai .msg-prompt-btn {
      float: right;
      opacity: .3;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      color: #888;
      padding: 2px 6px;
      border-radius: 4px;
      transition: opacity .15s;
    }
    .chat-message.ai:hover .msg-prompt-btn { opacity: .8; }
    .chat-message.ai .msg-prompt-btn:hover { background: #f0f0f0; opacity: 1; }

    /* ===== Chat Input ===== */
    .chat-input-area {
      padding: 12px 20px;
      border-top: 1px solid #e8e8e8;
      background: #fff;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 44px;
      max-height: 150px;
      line-height: 1.5;
      transition: border-color .2s;
    }
    .chat-input:focus { outline: none; border-color: #0f3460; }
    .chat-send-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #0f3460;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background .2s;
      white-space: nowrap;
    }
    .chat-send-btn:hover { background: #1a4a7a; }
    .chat-send-btn:disabled { background: #ccc; cursor: not-allowed; }
    .chat-send-btn.loading { opacity: .7; pointer-events: none; }

    /* ===== Chat Loading ===== */
    .chat-loading {
      align-self: flex-start;
      display: flex;
      gap: 6px;
      padding: 12px 16px;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
    }
    .chat-loading-dot {
      width: 8px; height: 8px;
      background: #888;
      border-radius: 50%;
      animation: chatBounce 1.2s infinite;
    }
    .chat-loading-dot:nth-child(2) { animation-delay: .2s; }
    .chat-loading-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes chatBounce {
      0%, 80%, 100% { transform: scale(.6); opacity: .4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ===== Responsive Chat ===== */
    @media (max-width: 768px) {
      .chat-sidebar { width: 200px; }
      .chat-message { max-width: 95%; }
      .nav-tabs { margin-left: 8px; }
      .nav-tab { padding: 4px 10px; font-size: 12px; }
    }
    @media (max-width: 500px) {
      .chat-layout { flex-direction: column; }
      .chat-sidebar { width: 100%; height: auto; max-height: 160px; border-right: none; border-bottom: 1px solid #e8e8e8; }
      .chat-session-list { max-height: 100px; }
    }
  </style>
</head>
<body>

<!-- ===== Header ===== -->
<header class="header">
  <div class="header-left">
    <h1>
      GY · 代码知识库
      <small>Code Learning Hub</small>
    </h1>
    <nav class="nav-tabs">
      <button class="nav-tab active" data-page="knowledge" onclick="switchPage('knowledge')">📚 知识库</button>
      <button class="nav-tab" data-page="chat" onclick="switchPage('chat')">💬 AI 对话</button>
    </nav>
  </div>
  <span class="badge">💻 学编程 · 查代码 · 用 AI</span>
</header>

<!-- ===== Alert ===== -->
<div id="alert" class="alert"></div>

<!-- ===== Container ===== -->
<div id="page-knowledge" class="page active">
<div class="container">

  <!-- ===== Sidebar ===== -->
  <aside class="sidebar">
    <!-- AI 搜索 -->
    <div class="card">
      <div class="card-header">
        <span>🤖 AI 代码搜索</span>
        <span class="watermark-badge" style="font-size:10px">DeepSeek</span>
      </div>
      <div class="card-body">
        <div class="search-box">
          <input id="aiQuery" class="form-control" placeholder="用自然语言搜代码…" onkeydown="if(event.key==='Enter')aiSearch()">
          <button class="btn btn-primary btn-sm" onclick="aiSearch()">🔍</button>
        </div>
        <div id="aiResult" class="ai-result"></div>
      </div>
    </div>

    <!-- 语言筛选 -->
    <div class="card">
      <div class="card-header">
        <span>📂 语言</span>
        <button class="btn btn-sm btn-ghost" onclick="clearLangFilter()" id="clearLangBtn" style="display:none">清除</button>
      </div>
      <div class="card-body" style="padding:8px 12px">
        <ul id="langList" class="lang-list">
          <li class="loading"><div class="spinner"></div></li>
        </ul>
      </div>
    </div>

    <!-- 难度筛选 -->
    <div class="card">
      <div class="card-header"><span>🎯 难度</span></div>
      <div class="card-body">
        <div class="diff-group">
          <button class="diff-btn active" data-diff="" onclick="setDifficulty(this)">全部</button>
          <button class="diff-btn" data-diff="beginner" onclick="setDifficulty(this)">⭐ 初级</button>
          <button class="diff-btn" data-diff="intermediate" onclick="setDifficulty(this)">⭐⭐ 中级</button>
          <button class="diff-btn" data-diff="advanced" onclick="setDifficulty(this)">⭐⭐⭐ 高级</button>
        </div>
      </div>
    </div>

    <!-- RAG 知识库 -->
    <div class="card">
      <div class="card-header"><span>📚 知识库问答</span></div>
      <div class="card-body rag-section">
        <div id="ragStatus" class="rag-status" onclick="ragList()">📖 加载中...</div>

        <!-- 上传区域 -->
        <div class="rag-upload" id="ragUploadZone" onclick="document.getElementById('ragFileInput').click()">
          📄 点击选择 .txt / .md 文件上传
        </div>
        <input type="file" id="ragFileInput" accept=".txt,.md" onchange="ragUploadFile(event)">
        <div id="ragUploadStatus" style="font-size:12px;color:#888;margin-top:4px;display:none"></div>

        <!-- 工具按钮 -->
        <div class="rag-tools">
          <button class="btn btn-sm btn-outline" onclick="ragExport()">📥 导出 Markdown</button>
        </div>

        <!-- 提问 -->
        <div class="rag-ask-box">
          <input id="ragQuery" class="form-control" placeholder="问知识库…" onkeydown="if(event.key==='Enter')ragAsk()">
          <button class="btn btn-sm btn-primary" onclick="ragAsk()">💬</button>
        </div>
        <div id="ragResult" class="rag-result"></div>
      </div>
    </div>
  </aside>

  <!-- ===== Main ===== -->
  <main class="main">
    <div class="toolbar">
      <div class="toolbar-left">
        <span id="sectionTitle" style="font-weight:600;font-size:16px">📄 全部代码</span>
        <span id="resultCount" class="result-count"></span>
      </div>
      <div>
        <button class="btn btn-primary" onclick="openCreateModal()">➕ 新增代码</button>
        <button class="btn btn-outline btn-sm" onclick="loadSnippets()">🔄 刷新</button>
      </div>
    </div>

    <!-- 代码列表 -->
    <div id="snippetList"></div>

    <!-- 响应预览 -->
    <div id="responseBox" class="response-box"></div>
  </main>
</div>

<!-- ===== Code Modal (Create/Edit) ===== -->
<div id="modal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <span id="modalTitle">新增代码片段</span>
      <button class="close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <form id="modalForm" onsubmit="return false">
        <div class="form-row">
          <div class="form-group" style="flex:2">
            <label>标题 <span style="color:#e94560">*</span></label>
            <input id="f_title" class="form-control" placeholder="代码片段名称" required>
          </div>
          <div class="form-group" style="flex:1">
            <label>语言 <span style="color:#e94560">*</span></label>
            <select id="f_language" class="form-control" required>
              <option value="">选择语言</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group" style="flex:1">
            <label>难度</label>
            <select id="f_difficulty" class="form-control">
              <option value="beginner">⭐ 初级</option>
              <option value="intermediate" selected>⭐⭐ 中级</option>
              <option value="advanced">⭐⭐⭐ 高级</option>
            </select>
          </div>
          <div class="form-group" style="flex:2">
            <label>标签（逗号分隔）</label>
            <input id="f_tags" class="form-control" placeholder="如：排序,算法,基础">
          </div>
        </div>
        <div class="form-group">
          <label>说明</label>
          <textarea id="f_description" class="form-control" rows="2" style="font-family:inherit;min-height:auto;resize:vertical" placeholder="代码的作用和用法说明"></textarea>
        </div>
        <div class="form-group">
          <label>代码内容 <span style="color:#e94560">*</span></label>
          <textarea id="f_code" class="form-control" rows="10" placeholder="在此粘贴代码..." required></textarea>
        </div>
        <div class="form-group">
          <label>来源（可选）</label>
          <input id="f_source" class="form-control" placeholder="如：菜鸟教程、LeetCode">

    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button id="modalSubmit" class="btn btn-primary" onclick="submitModal()">💾 保存</button>

</div>

</div>

<!-- ===== AI 对话页面 ===== -->
<div id="page-chat" class="page">
  <div class="chat-layout">
    <!-- 左侧：会话列表 -->
    <div class="chat-sidebar">
      <div class="chat-sidebar-header">
        <span class="chat-sidebar-title">💬 对话历史</span>

            <button class="btn-icon" onclick="deleteChatSession(currentSessionId)" title="删除" style="color:#e94560">🗑️</button>
          </div>

<div id="promptModal" class="modal-overlay">

      <span>🧠 提示词记录</span>
      <button class="close" onclick="closePromptModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div id="promptContent" style="white-space:pre-wrap;font-size:13px;line-height:1.6;background:#f5f5f5;padding:16px;border-radius:8px;max-height:60vh;overflow-y:auto;font-family:monospace"></div>

    </div>
  </div>

<!-- ===== Footer ===== -->
<div class="footer">
  GY · 代码知识库 — 学编程 · 查代码 · 用 AI
</div>

<script>
// ==================== State ====================
const API = window.location.origin;
let allSnippets = [];
let languages = [];
let selectedLang = '';
let selectedDiff = '';
let editId = null;
let currentView = 'list'; // 'list' | 'ai'

// ==================== Utils ====================
function $(id) { return document.getElementById(id); }

function showAlert(msg, type = 'success') {
  const el = $('alert');
  el.textContent = msg;
  el.className = 'alert alert-' + type + ' show';
  setTimeout(() => el.classList.remove('show'), 3000);
}

function showResponse(data) {
  const el = $('responseBox');
  el.textContent = JSON.stringify(data, null, 2);
  el.classList.add('show');
}

function escHtml(s) {
  if (s === null || s === undefined) return '<span style="color:#bbb">NULL</span>';
  const v = String(s);
  return v.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function getLangClass(lang) {
  if (!lang) return 'unknown';
  const cls = lang.toLowerCase().replace(/[+#]/g, '').replace(/^c$/, 'cpp');
  if (['js','javascript','ts','typescript','py','python','java','go','rs','rust','cpp','cs','php','rb','ruby','swift','kt','kotlin'].includes(cls)) return cls;
  if (cls === 'c#') return 'cs';
  if (cls === 'c++') return 'cpp';
  return 'unknown';
}

function getDifficultyStars(diff) {
  if (diff === 'beginner') return '⭐ 初级';
  if (diff === 'intermediate') return '⭐⭐ 中级';
  if (diff === 'advanced') return '⭐⭐⭐ 高级';
  return diff || '未知';
}

function getDiffClass(diff) {
  return diff === 'beginner' ? 'beginner' : diff === 'intermediate' ? 'intermediate' : diff === 'advanced' ? 'advanced' : '';
}

// ==================== Init ====================
async function init() {
  await loadLanguages();
  await loadSnippets();
  await ragList();
  populateLanguageSelect();
}

// ==================== Languages ====================
async function loadLanguages() {
  try {
    const res = await fetch(API + '/api/languages');
    const json = await res.json();
    if (!json.success) throw new Error(json.message);
    languages = json.data || [];
    renderLangList();
  } catch (e) {
    // fallback: default languages
    languages = [
      { name: 'JavaScript' }, { name: 'TypeScript' }, { name: 'Python' },
      { name: 'Java' }, { name: 'Go' }, { name: 'Rust' }, { name: 'C++' },
      { name: 'C#' }, { name: 'PHP' }, { name: 'Ruby' }, { name: 'Swift' }, { name: 'Kotlin' }
    ];
    renderLangList();
  }
}

function renderLangList() {
  const list = $('langList');
  // count snippets per language
  const counts = {};
  allSnippets.forEach(s => {
    const lang = s.language || '其他';
    counts[lang] = (counts[lang] || 0) + 1;
  });

  list.innerHTML = '<li class="lang-item' + (!selectedLang ? ' active' : '') + '" onclick="selectLang(\'\')"><span>🌐 全部</span><span class="lang-count">' + allSnippets.length + '</span></li>';
  languages.forEach(l => {
    const count = counts[l.name] || 0;
    if (count === 0 && selectedLang !== l.name) return; // hide unused languages unless selected
    list.innerHTML += '<li class="lang-item' + (selectedLang === l.name ? ' active' : '') + '" onclick="selectLang(\'' + escHtml(l.name) + '\')"><span>' + getLangIcon(l.name) + ' ' + escHtml(l.name) + '</span><span class="lang-count">' + count + '</span></li>';
  });
  // show other languages not in the languages table
  for (const [lang, count] of Object.entries(counts)) {
    if (count > 0 && !languages.find(l => l.name === lang)) {
      list.innerHTML += '<li class="lang-item' + (selectedLang === lang ? ' active' : '') + '" onclick="selectLang(\'' + escHtml(lang) + '\')"><span>' + getLangIcon(lang) + ' ' + escHtml(lang) + '</span><span class="lang-count">' + count + '</span></li>';
    }
  }
  $('clearLangBtn').style.display = selectedLang ? 'inline-block' : 'none';
}

function getLangIcon(lang) {
  const icons = {
    'JavaScript': '🟡', 'TypeScript': '🔵', 'Python': '🐍', 'Java': '☕',
    'Go': '🔷', 'Rust': '🦀', 'C++': '⚡', 'C#': '🔮',
    'PHP': '🐘', 'Ruby': '💎', 'Swift': '🔥', 'Kotlin': '🟣'
  };
  return icons[lang] || '📄';
}

function selectLang(lang) {
  selectedLang = lang;
  renderLangList();
  loadSnippets();
}

function clearLangFilter() {
  selectedLang = '';
  renderLangList();
  loadSnippets();
}

function setDifficulty(btn) {
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedDiff = btn.dataset.diff || '';
  loadSnippets();
}

function populateLanguageSelect() {
  const sel = $('f_language');
  sel.innerHTML = '<option value="">选择语言</option>';
  languages.forEach(l => {
    sel.innerHTML += '<option value="' + escHtml(l.name) + '">' + escHtml(l.name) + '</option>';
  });
}

// ==================== Snippets ====================
async function loadSnippets() {
  $('sectionTitle').textContent = selectedLang ? `📄 ${selectedLang}` : '📄 全部代码';
  $('resultCount').textContent = '';
  $('snippetList').innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  try {
    let url = API + '/api/code_snippets?_sort=created_at&_order=DESC&_size=200';
    const params = new URLSearchParams();
    if (selectedLang) params.set('language', selectedLang);
    if (selectedDiff) params.set('difficulty', selectedDiff);
    const qs = params.toString();
    if (qs) url += '&' + qs;

    const res = await fetch(url);
    const json = await res.json();
    if (!json.success) throw new Error(json.message);
    allSnippets = json.data || [];
    renderSnippets(allSnippets, json);
    showResponse(json);
    // re-render lang list counts
    renderLangList();
  } catch (e) {
    $('snippetList').innerHTML = '<div style="color:#e94560;padding:20px;text-align:center">❌ ' + escHtml(e.message) + '</div>';
  }
}

function renderSnippets(data, meta) {
  const container = $('snippetList');

  if (data.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">暂无代码片段</div><p style="margin-top:8px;font-size:14px;color:#aaa">点击右上角「新增代码」添加第一个示例</p></div>';
    $('resultCount').textContent = '0 条';
    return;
  }

  $('resultCount').textContent = meta ? `共 ${meta.total || data.length} 条` : `${data.length} 条`;

  container.innerHTML = data.map(s => `
    <div class="code-card" data-id="${s.id}" onclick="toggleCode(event, ${s.id})">
      <div class="code-card-header">
        <div class="code-card-info">
          <div class="code-card-title">
            📄 ${escHtml(s.title)}
            <span class="lang-tag ${getLangClass(s.language)}">${escHtml(s.language)}</span>
          </div>
          <div class="code-card-meta">
            <span class="diff-tag ${getDiffClass(s.difficulty)}">${getDifficultyStars(s.difficulty)}</span>
            ${(s.tags || '').split(',').filter(Boolean).map(t => `<span class="tag-badge">${escHtml(t.trim())}</span>`).join('')}
            <span style="font-size:12px;color:#bbb">#${s.id}</span>
          </div>
        </div>
        <div class="code-card-actions" onclick="event.stopPropagation()">
          <button class="btn-icon" onclick="openEditModal(${s.id})" title="编辑">✏️</button>
          <button class="btn-icon" onclick="deleteSnippet(${s.id})" title="删除" style="color:#e94560">🗑️</button>
          <span class="expand-icon">▶</span>
        </div>
      </div>
      ${s.description ? `<div class="code-description">${escHtml(s.description)}</div>` : ''}
      <div class="code-card-body">
        <div class="code-block-wrap">
          <button class="copy-btn" onclick="copyCode(${s.id})">📋 复制</button>
          <pre><code class="language-${getLangClass(s.language)}">${escHtml(s.code)}</code></pre>
        </div>
      </div>
    </div>
  `).join('');
}

async function aiSearch() {
  const query = $('aiQuery').value.trim();
  if (!query) { showAlert('请输入搜索内容', 'danger'); return; }

  const resultDiv = $('aiResult');
  resultDiv.className = 'ai-result show';
  resultDiv.innerHTML = '<div class="loading" style="padding:12px"><div class="spinner"></div></div>';

  try {
    const res = await fetch(API + '/api/ai/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query }),
    });
    const json = await res.json();

    if (!json.success) throw new Error(json.message || '查询失败');

    let html = '';

    // SQL 语句
    if (json.sql) {
      html += '<div class="ai-sql">📝 ' + escHtml(json.sql) + '</div>';
    }

    // AI 回答
    if (json.answer) {
      html += '<div class="ai-answer">🤖 ' + escHtml(json.answer) + '</div>';
    }

    // 如果有数据，渲染成卡片
    if (json.data && json.data.length > 0) {
      html += '<div style="font-size:12px;color:#888;margin-bottom:6px">共 ' + json.count + ' 条结果</div>';
      html += '<div style="max-height:400px;overflow-y:auto">';
      json.data.forEach(row => {
        const title = row.title || row.name || '记录';
        const lang = row.language || '';
        const desc = row.description || row.email || '';
        html += '<div class="ai-card" onclick="selectSnippetFromSearch(' + (row.id || '') + ')">';
        html += '  <div class="card-title">📄 ' + escHtml(title);
        if (lang) html += ' <span class="lang-tag ' + getLangClass(lang) + '" style="font-size:10px">' + escHtml(lang) + '</span>';
        html += '  </div>';
        if (desc) html += '  <div class="card-sub">' + escHtml(desc).slice(0, 80) + '</div>';
        html += '</div>';
      });
      html += '</div>';
    } else if (!json.answer && (!json.data || json.data.length === 0)) {
      html += '<div style="color:#888;padding:8px">😕 未找到相关代码</div>';
    }

    resultDiv.innerHTML = html;

    // 如果搜索结果中有 code_snippets 数据，替换主列表为搜索结果
    if (json.data && json.data.length > 0 && json.data[0].hasOwnProperty('code')) {
      currentView = 'ai';
      $('sectionTitle').textContent = '🔍 AI 搜索结果';
      renderSnippets(json.data, { total: json.data.length });
    }

    showResponse(json);
  } catch (e) {
    resultDiv.innerHTML = '<div style="padding:8px 12px;background:#f8d7da;border-radius:8px;color:#721c24">❌ ' + escHtml(e.message) + '</div>';
  }
}

async function ragExport() {
  try {
    const res = await fetch(API + '/api/rag/export');
    const contentType = res.headers.get('content-type') || '';

    if (contentType.includes('json')) {
      const json = await res.json();
      showAlert(json.message || '导出失败', 'danger');
      return;
    }

    // 获取 blob 并下载
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'knowledge-base.md';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showAlert('📥 知识库已导出为 Markdown 文件', 'success');
  } catch (e) {
    showAlert('导出失败: ' + e.message, 'danger');
  }
}

document.addEventListener('DOMContentLoaded', function() {
  const zone = document.getElementById('ragUploadZone');
  if (!zone) return;
  zone.addEventListener('dragover', function(e) {
    e.preventDefault();
    this.classList.add('dragover');
  });
  zone.addEventListener('dragleave', function() {
    this.classList.remove('dragover');
  });
  zone.addEventListener('drop', function(e) {
    e.preventDefault();
    this.classList.remove('dragover');
    const files = e.dataTransfer.files;
    if (files.length > 0) {
      const input = document.getElementById('ragFileInput');
      const dt = new DataTransfer();
      dt.items.add(files[0]);
      input.files = dt.files;
      ragUploadFile({ target: { files: [files[0]] } });
    }
  });
});

/**
 * Render markdown-like text to HTML with code highlighting
 */
function renderChatContent(text) {
  // Split by code blocks first
  let html = '';
  let lastIdx = 0;
  const blockRegex = /```(\w*)\n?([\s\S]*?)```/g;
  let match;

  while ((match = blockRegex.exec(text)) !== null) {
    // Text before this code block
    const before = text.slice(lastIdx, match.index);
    if (before.trim()) {
      html += '<p>' + escHtml(before).replace(/\n/g, '<br>') + '</p>';
    }

    const lang = match[1] || '';
    const code = match[2];
    html += '<pre><code class="language-' + (lang || 'plaintext') + '">' + escHtml(code.trim()) + '</code></pre>';
    lastIdx = match.index + match[0].length;
  }

  // Remaining text after last code block
  const after = text.slice(lastIdx);
  if (after.trim()) {
    html += '<p>' + escHtml(after).replace(/\n/g, '<br>') + '</p>';
  }

  return html;
}

function renderChatMessages() {
  const msgArea = $('chatMessages');
  if (chatMessages.length === 0) {
    msgArea.innerHTML = '<div class="chat-empty-msg">发送一条消息开始对话</div>';
    return;
  }
  msgArea.innerHTML = chatMessages.map(msg => {
    const role = msg.role === 'user' ? 'user' : 'ai';
    const icon = msg.role === 'user' ? '👤' : '🤖';
    const content = msg.role === 'assistant' ? renderChatContent(msg.content) : '<p>' + escHtml(msg.content).replace(/\n/g, '<br>') + '</p>';
    const promptBtn = msg.role === 'assistant' && msg.prompt_info
      ? '<button class="msg-prompt-btn" onclick="showPromptInfo(' + msg.id + ')" title="查看提示词记录">🧠</button>'
      : '';

    // KB sources for historical messages
    let kbHtml = '';
    if (msg.role === 'assistant' && msg.prompt_info) {
      const pi = typeof msg.prompt_info === 'string' ? JSON.parse(msg.prompt_info) : msg.prompt_info;
      if (pi.kb_used && pi.kb_sources && pi.kb_sources.length > 0) {
        const tags = pi.kb_sources.map(s =>
          '<span class="kb-source-tag">📎 ' + escHtml(s.source || s.title) + '</span>'
        ).join(' ');
        kbHtml = '<div class="kb-sources"><span class="kb-sources-label">📚 参考知识库</span>' + tags + '</div>';
      } else if (pi.kb_used && (!pi.kb_sources || pi.kb_sources.length === 0)) {
        kbHtml = '<div class="kb-no-result">📚 知识库未找到相关参考资料</div>';
      }
    }

    return '<div class="chat-message ' + role + '">' +
      promptBtn +
      '<span class="msg-role-icon">' + icon + '</span> ' +
      content + kbHtml +
      '</div>';
  }).join('');
  scrollChatToBottom();
  setTimeout(highlightChatCode, 100);
}

function chatInputKeydown(e) {

async function sendChatMessage() {
  const input = $('chatInput');
  const message = input.value.trim();
  if (!message) return;
  if (!currentSessionId) {
    showAlert('请先创建或选择一个对话', 'danger');
    return;
  }
  if (isSending) return;

  isSending = true;
  const sendBtn = document.querySelector('.chat-send-btn');
  sendBtn.classList.add('loading');
  sendBtn.textContent = '...';

  // Show user message immediately
  chatMessages.push({ role: 'user', content: message });
  const msgArea = $('chatMessages');
  const userBubble = '<div class="chat-message user"><span class="msg-role-icon">👤</span> <p>' + escHtml(message).replace(/\n/g, '<br>') + '</p></div>';
  // Remove empty state if present
  const emptyMsg = msgArea.querySelector('.chat-empty-msg');
  if (emptyMsg) msgArea.innerHTML = '';
  msgArea.insertAdjacentHTML('beforeend', userBubble);
  scrollChatToBottom();
  input.value = '';

  // Show loading dots
  const loadingHTML = '<div class="chat-loading" id="chatLoading"><div class="chat-loading-dot"></div><div class="chat-loading-dot"></div><div class="chat-loading-dot"></div></div>';
  msgArea.insertAdjacentHTML('beforeend', loadingHTML);
  scrollChatToBottom();

  try {
    const res = await fetch(API + '/api/chat/sessions/' + currentSessionId + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, use_kb: useKb }),
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.message);

    // Remove loading
    const loading = $('chatLoading');
    if (loading) loading.remove();

    // Add AI response
    let aiContent = renderChatContent(json.message);
    // KB sources display
    if (json.kbUsed && json.kbSources && json.kbSources.length > 0) {
      const tags = json.kbSources.map(s =>
        '<span class="kb-source-tag">📎 ' + escHtml(s.source || s.title) + (s.relevance ? ' ' + s.relevance + '%' : '') + '</span>'
      ).join(' ');
      aiContent += '<div class="kb-sources"><span class="kb-sources-label">📚 参考知识库</span>' + tags + '</div>';
    } else if (json.kbUsed && (!json.kbSources || json.kbSources.length === 0)) {
      aiContent += '<div class="kb-no-result">📚 知识库未找到相关参考资料</div>';
    }
    const aiBubble = '<div class="chat-message ai">' +
      '<button class="msg-prompt-btn" onclick="showPromptInfoFromData(this)" title="查看提示词记录">🧠</button>' +
      '<span class="msg-role-icon">🤖</span> ' + aiContent +
      '</div>';
    msgArea.insertAdjacentHTML('beforeend', aiBubble);
    scrollChatToBottom();
    setTimeout(highlightChatCode, 100);

    // Update session list and message count
    $('chatMsgCount').textContent = (chatMessages.length + 1) + ' 条消息';
    chatMessages.push({ role: 'assistant', content: json.message, prompt_info: json.promptInfo });
    await loadChatSessions();
  } catch (e) {
    const loading = $('chatLoading');
    if (loading) loading.remove();
    const errHTML = '<div class="chat-message ai" style="background:#fef0f0;border-color:#e94560">' +
      '<span class="msg-role-icon">❌</span> <p>请求失败：' + escHtml(e.message) + '</p></div>';
    msgArea.insertAdjacentHTML('beforeend', errHTML);
    scrollChatToBottom();
  }

  isSending = false;
  sendBtn.classList.remove('loading');
  sendBtn.textContent = '发送 ➤';
  input.focus();
}

// ===== Prompt Info =====
function showPromptInfo(messageId) {
  const msg = chatMessages.find(m => m.id === messageId);
  if (!msg || !msg.prompt_info) return;
  const info = msg.prompt_info;
  let content = '=== 系统提示词 ===\n\n' + (info.system_prompt || '(无)') +
    '\n\n=== 用户消息 ===\n\n' + (info.last_user_message || '(无)') +
    '\n\n=== 调用参数 ===\n' +
    '模型: ' + (info.model || 'deepseek-chat') + '\n' +
    '温度: ' + (info.temperature || 0.3) + '\n' +
    '最大Token: ' + (info.max_tokens || 2000) + '\n' +
    '上下文消息数: ' + (info.messages_in_context || '?') + '\n' +
        (promptInfo.kb_used ? '参考知识库: ' + (promptInfo.kb_source_count > 0 ? '是 (' + promptInfo.kb_source_count + ' 条资料)' : '是 (未找到匹配)') : '参考知识库: 否') + '
' +
        (info.kb_used ? '参考知识库: ' + (info.kb_source_count > 0 ? '是 (' + info.kb_source_count + ' 条资料)' : '是 (未找到匹配)') : '参考知识库: 否') + '
' +
    '时间: ' + (info.timestamp || '(无)');
  $('promptContent').textContent = content;
  $('promptModal').classList.add('show');
}

function showPromptInfoFromData(btn) {
  // Find the parent AI message - the prompt info was stored when rendering
  // We need to get it from the chatMessages array by finding the matching AI message
  const allAIMsgs = chatMessages.filter(m => m.role === 'assistant' && m.prompt_info);
  // Get the index of this button relative to AI messages
  const aiBubbles = document.querySelectorAll('.chat-message.ai');
  let idx = -1;
  for (let i = 0; i < aiBubbles.length; i++) {
    if (aiBubbles[i].contains(btn)) { idx = i; break; }
  }
  // Find the corresponding prompt_info
  let promptInfo = null;
  let count = 0;
  for (const m of chatMessages) {
    if (m.role === 'assistant' && m.prompt_info) {
      if (count === idx) { promptInfo = m.prompt_info; break; }
      count++;
    }
  }
  if (!promptInfo) return;
  // Render
  let content = '=== 系统提示词 ===\n\n' + (promptInfo.system_prompt || '(无)') +
    '\n\n=== 用户消息 ===\n\n' + (promptInfo.last_user_message || '(无)') +
    '\n\n=== 调用参数 ===\n' +
    '模型: ' + (promptInfo.model || 'deepseek-chat') + '\n' +
    '温度: ' + (promptInfo.temperature || 0.3) + '\n' +
    '最大Token: ' + (promptInfo.max_tokens || 2000) + '\n' +
    '上下文消息数: ' + (promptInfo.messages_in_context || '?') + '\n' +
    '时间: ' + (promptInfo.timestamp || '(无)');
  $('promptContent').textContent = content;
  $('promptModal').classList.add('show');
}

function closePromptModal() {
  $('promptModal').classList.remove('show');
}

// ==================== Start ====================
init();
</script>
